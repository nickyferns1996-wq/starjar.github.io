<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Stars</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:
radial-gradient(circle at top,#1e3a8a 0%,#0f172a 35%,#020617 100%);
min-height:100vh;
color:white;
overflow-x:hidden;
}

.stars-bg{
position:fixed;
inset:0;
pointer-events:none;
}

.twinkle{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
opacity:.6;
animation:twinkle 4s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2}
50%{opacity:1}
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.title{
font-size:3rem;
font-weight:700;
margin-bottom:20px;
}

.note{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(10px);
padding:25px;
border-radius:20px;
line-height:1.9;
max-width:650px;
margin:0 auto 40px;
}

.jar-wrapper{
display:flex;
justify-content:center;
margin-top:20px;
margin-bottom:20px;
}

.jar{
position:relative;
width:280px;
height:380px;
cursor:pointer;
transition:.3s;
}

.jar:hover{
transform:translateY(-5px);
}

.jar-top{
width:120px;
height:40px;
background:#94a3b8;
margin:auto;
border-radius:12px 12px 4px 4px;
}

.jar-body{
position:relative;
width:280px;
height:320px;
margin:auto;
border:4px solid rgba(255,255,255,.45);
background:rgba(255,255,255,.05);
backdrop-filter:blur(8px);
border-radius:40px;
overflow:hidden;
}

.paper-star{
position:absolute;
font-size:24px;
animation:float 5s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-8px)}
}

.progress{
margin-top:20px;
font-size:1.1rem;
opacity:.9;
}

.remaining{
margin-top:8px;
opacity:.7;
}

button{
padding:14px 24px;
border:none;
border-radius:999px;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

.primary{
background:white;
color:black;
font-weight:600;
}

.fortune-card{
margin-top:30px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.1);
padding:25px;
border-radius:20px;
line-height:1.8;
font-size:1.2rem;
}

.locked{
margin-top:30px;
padding:20px;
background:rgba(255,255,255,.08);
border-radius:16px;
}

.memory-box{
max-width:800px;
margin:60px auto;
text-align:left;
}

.memory-title{
font-size:1.5rem;
margin-bottom:20px;
}

.memory-item{
background:rgba(255,255,255,.06);
padding:14px;
border-radius:12px;
margin-bottom:10px;
}

.final-screen{
margin-top:40px;
font-size:1.4rem;
line-height:2;
}

</style>
</head>

<body>

<div class="stars-bg" id="starsBg"></div>

<div class="container">

<h1 class="title">100 Stars</h1>

<div class="note">

100 stars.<br><br>

100 fortunes.<br><br>

Open one each day.<br><br>

Some are nonsense.<br>
Some are reminders.<br>
Some are surprisingly wise.<br><br>

Take your time.

</div>

<div id="app"></div>

<div class="memory-box" id="memoryBox"></div>

</div>
<script>
const app = document.getElementById("app");
const starsBg = document.getElementById("starsBg");
const memoryBox = document.getElementById("memoryBox");

// 100 fortunes (you can replace/edit anytime)
const fortunes = Array.from({length: 100}, (_, i) => {
  const list = [
    "Something small will change your whole day.",
    "You are closer than you think.",
    "A quiet win is coming.",
    "Let it be simple today.",
    "Not everything needs a response.",
    "You will understand later.",
    "A good thing is on its way.",
    "You already survived the hardest part.",
    "Pause. You’re rushing nothing.",
    "This will make sense soon."
  ];
  return list[i % list.length];
});

// Load progress
let opened = JSON.parse(localStorage.getItem("openedStars") || "[]");

// Create background stars
for (let i = 0; i < 80; i++) {
  const s = document.createElement("div");
  s.className = "twinkle";
  s.style.top = Math.random() * 100 + "vh";
  s.style.left = Math.random() * 100 + "vw";
  s.style.animationDelay = Math.random() * 4 + "s";
  starsBg.appendChild(s);
}

// Render jar UI
function render() {
  app.innerHTML = "";

  const jar = document.createElement("div");
  jar.className = "jar";

  const top = document.createElement("div");
  top.className = "jar-top";

  const body = document.createElement("div");
  body.className = "jar-body";

  // stars inside jar
  for (let i = 0; i < 100; i++) {
    const star = document.createElement("div");
    star.className = "paper-star";
    star.innerHTML = "⭐";

    const isOpened = opened.includes(i);

    star.style.top = Math.random() * 90 + "%";
    star.style.left = Math.random() * 90 + "%";
    star.style.opacity = isOpened ? 0.2 : 1;
    star.style.transform = `scale(${isOpened ? 0.8 : 1})`;

    star.onclick = () => openStar(i);

    body.appendChild(star);
  }

  jar.appendChild(top);
  jar.appendChild(body);

  const progress = document.createElement("div");
  progress.className = "progress";
  progress.innerText = `${opened.length} / 100 opened`;

  const remaining = document.createElement("div");
  remaining.className = "remaining";
  remaining.innerText = `${100 - opened.length} remaining`;

  app.appendChild(jar);
  app.appendChild(progress);
  app.appendChild(remaining);

  if (opened.length === 100) {
    showFinal();
  }
}

function openStar(i) {
  if (opened.includes(i)) return;

  opened.push(i);
  localStorage.setItem("openedStars", JSON.stringify(opened));

  const card = document.createElement("div");
  card.className = "fortune-card";
  card.innerHTML = `
    ⭐ Fortune ${i + 1}<br><br>
    ${fortunes[i]}
  `;

  app.appendChild(card);

  render();
}

function showFinal() {
  const final = document.createElement("div");
  final.className = "final-screen";
  final.innerHTML = `
    You've opened every star.<br><br>
    You don’t need more wishes now.<br>
    You already collected them all.
  `;
  app.appendChild(final);
}

render();
</script>
